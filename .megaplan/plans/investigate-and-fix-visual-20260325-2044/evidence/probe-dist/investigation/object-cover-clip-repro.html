<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Cover Clip Repro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0f172a;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 28%),
          radial-gradient(circle at top right, rgba(251, 191, 36, 0.12), transparent 30%),
          #0f172a;
      }

      .layout {
        display: grid;
        gap: 20px;
      }

      .case {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .label {
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .viewport {
        position: relative;
        overflow: hidden;
        border-radius: 14px;
        background:
          linear-gradient(90deg, rgba(148, 163, 184, 0.18) 0 56px, rgba(15, 23, 42, 1) 56px calc(100% - 56px), rgba(148, 163, 184, 0.18) calc(100% - 56px) 100%);
      }

      .composition {
        position: absolute;
        top: 0;
        left: 56px;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: top left;
        background: #000;
      }

      .img-current {
        position: absolute;
        left: 658px;
        top: 0;
        width: 2256px;
        height: 1692px;
        -o-object-fit: cover;
           object-fit: cover;
        clip-path: inset(0% 53% 53% 0%);
      }

      .visible-bounds {
        position: absolute;
        left: 658px;
        top: 0;
        width: 1060.32px;
        height: 795.24px;
        border: 8px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.75);
        pointer-events: none;
      }

      .note {
        font-size: 12px;
        color: #cbd5e1;
      }

      pre {
        margin: 0;
        padding: 14px;
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.9);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        white-space: pre-wrap;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="layout" id="layout"></div>
    <script>
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1000" viewBox="0 0 3000 1000">
          <rect width="3000" height="1000" fill="#020617" />
          <rect x="0" y="0" width="750" height="1000" fill="#ef4444" />
          <rect x="750" y="0" width="750" height="1000" fill="#22c55e" />
          <rect x="1500" y="0" width="750" height="1000" fill="#3b82f6" />
          <rect x="2250" y="0" width="750" height="1000" fill="#f59e0b" />
          <g fill="#ffffff" font-family="monospace" font-size="140" font-weight="700">
            <text x="110" y="210">LEFT</text>
            <text x="855" y="210">MID-L</text>
            <text x="1615" y="210">MID-R</text>
            <text x="2355" y="210">RIGHT</text>
          </g>
          <g stroke="#ffffff" stroke-width="12" opacity="0.45">
            <line x1="750" y1="0" x2="750" y2="1000" />
            <line x1="1500" y1="0" x2="1500" y2="1000" />
            <line x1="2250" y1="0" x2="2250" y2="1000" />
          </g>
        </svg>
      `;
      const src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      const cases = [
        { name: 'scale-1.0', scale: 1 },
        { name: 'scale-0.4', scale: 0.4 },
        { name: 'scale-0.25', scale: 0.25 },
      ];

      const layout = document.getElementById('layout');

      const readRect = (element) => {
        const rect = element.getBoundingClientRect();
        return {
          left: Math.round(rect.left * 100) / 100,
          top: Math.round(rect.top * 100) / 100,
          width: Math.round(rect.width * 100) / 100,
          height: Math.round(rect.height * 100) / 100,
        };
      };

      for (const entry of cases) {
        const viewportWidth = 56 + 1920 * entry.scale + 56;
        const viewportHeight = 1080 * entry.scale;
        const section = document.createElement('section');
        section.className = 'case';
        section.dataset.case = entry.name;
        section.innerHTML = `
          <div class="label">${entry.name}</div>
          <div class="viewport" style="width:${viewportWidth}px;height:${viewportHeight}px">
            <div class="composition" style="transform:scale(${entry.scale})">
              <img class="img-current" alt="" src="${src}" />
              <div class="visible-bounds"></div>
            </div>
          </div>
          <div class="note">Current CSS pipeline only: absolute box + object-fit: cover + clip-path + overflow hidden on the composition container.</div>
          <pre class="results">Waiting…</pre>
        `;
        layout.appendChild(section);
      }

      const run = () => {
        for (const entry of cases) {
          const section = document.querySelector(`[data-case="${entry.name}"]`);
          const viewport = section.querySelector('.viewport');
          const composition = section.querySelector('.composition');
          const image = section.querySelector('.img-current');
          const bounds = section.querySelector('.visible-bounds');
          const samplePoint = {
            x: Math.round((56 + (658 + 140) * entry.scale) * 100) / 100,
            y: Math.round((140 * entry.scale) * 100) / 100,
          };
          const spillPoint = {
            x: Math.round((56 + 1920 * entry.scale + 18) * 100) / 100,
            y: Math.round((120 * entry.scale) * 100) / 100,
          };
          const sampleElements = document.elementsFromPoint(samplePoint.x, section.getBoundingClientRect().top + samplePoint.y)
            .slice(0, 4)
            .map((element) => ({
              tag: element.tagName.toLowerCase(),
              className: element.className || null,
            }));
          const spillElements = document.elementsFromPoint(spillPoint.x, section.getBoundingClientRect().top + spillPoint.y)
            .slice(0, 4)
            .map((element) => ({
              tag: element.tagName.toLowerCase(),
              className: element.className || null,
            }));
          section.querySelector('.results').textContent = JSON.stringify({
            scale: entry.scale,
            viewport: readRect(viewport),
            composition: readRect(composition),
            image: readRect(image),
            visibleBounds: readRect(bounds),
            samplePoint,
            sampleElements,
            spillPoint,
            spillElements,
            imageComputed: {
              objectFit: getComputedStyle(image).objectFit,
              clipPath: getComputedStyle(image).clipPath,
              transform: getComputedStyle(composition).transform,
            },
          }, null, 2);
        }

        document.body.dataset.probeReady = 'true';
      };

      if (document.readyState === 'complete') {
        requestAnimationFrame(() => requestAnimationFrame(run));
      } else {
        window.addEventListener('load', () => requestAnimationFrame(() => requestAnimationFrame(run)), { once: true });
      }
    </script>
  </body>
</html>
